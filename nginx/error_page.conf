fastcgi_intercept_errors        on;
proxy_intercept_errors          on;

error_page 500 501 502 503 504 533 @error_page;

location @error_page {
    access_by_lua return;
    content_by_lua_block {
        local status = ngx.status;
        local HTTP_ERRORS = {
            s400 = 'Bad Request',
            s401 = 'Unauthorized',
            s403 = 'Access Denied',
            s404 = 'Resource not found',
            s500 = 'Webservice currently unavailable',
            s501 = 'Not Implemented',
            s502 = 'Webservice currently unavailable',
            s503 = 'Webservice currently unavailable',
            s504 = 'Gateway Timeout',
            s533 = 'Scheduled Maintenance',
            default = 'Server unavailable'
        }
        local HTTP_MESSAGES = {
            s400 = 'The server cannot process the request due to something that is perceived to be a client error.',
            s401 = 'The requested resource requires an authentication.',
            s403 = 'The requested resource requires an authentication.',
            s404 = 'The requested resource could not be found but may be available again in the future.',
            s500 = 'An unexpected condition was encountered.\n<br />Our SRE team has been dispatched to bring it back online.',
            s501 = 'The Webserver cannot recognize the request method.',
            s502 = 'We&#39;ve got some trouble with our backend upstream cluster.\n<br />Our SRE team has been dispatched to bring it back online.',
            s503 = 'We&#39;ve got some trouble with our backend upstream cluster.\n<br />Our SRE team has been dispatched to bring it back online.',
            s504 = 'The upstream server is timing out.',
            s533 = 'This site is currently down for maintenance.\n<br />Our SER team is working hard to bring it back online soon.',
            default = 'We&#39;ve got some trouble with our backend upstream cluster.\n<br />Our service team has been dispatched to bring it back online.'
        }
        local html_key = 's' .. tostring(status)
        local html_error = HTTP_ERRORS[html_key]
        local html_msg = HTTP_MESSAGES[html_key]
        local request_id = ngx.var.req_id
        local request_time = ngx.var.request_time
        local client_ip = ngx.var.remote_addr
        local datetime = os.date('%Y-%m-%d %H:%M:%S %Z', ngx.time())
        local html = string.format('<!DOCTYPE html>\n<html lang="en">\n\t<head>\n\t\t<meta charset="utf-8" />\n\t\t<meta http-equiv="X-UA-Compatible" content="IE=edge" />\n\t\t<meta name="viewport" content="width=device-width, initial-scale=1" />\n\t\t<title>%s - %s</title>\n\t\t<style type="text/css">\n\t\t\thtml{font-family:sans-serif;line-height:1.15;-ms-text-size-adjust:100%%;-webkit-text-size-adjust:100%%}body{margin:0}article,aside,footer,header,nav,section{display:block}h1{font-size:2em;margin:.67em 0}figcaption,figure,main{display:block}figure{margin:1em 40px}hr{box-sizing:content-box;height:0;overflow:visible}pre{font-family:monospace,monospace;font-size:1em}a{background-color:transparent;-webkit-text-decoration-skip:objects}a:active,a:hover{outline-width:0}abbr[title]{border-bottom:0;text-decoration:underline;text-decoration:underline dotted}b,strong{font-weight:inherit}b,strong{font-weight:bolder}code,kbd,samp{font-family:monospace,monospace;font-size:1em}dfn{font-style:italic}mark{background-color:#ff0;color:#000}small{font-size:80%%}sub,sup{font-size:75%%;line-height:0;position:relative;vertical-align:baseline}sub{bottom:-.25em}sup{top:-.5em}audio,video{display:inline-block}audio:not([controls]){display:none;height:0}img{border-style:none}svg:not(:root){overflow:hidden}button,input,optgroup,select,textarea{font-family:sans-serif;font-size:100%%;line-height:1.15;margin:0}button,input{overflow:visible}button,select{text-transform:none}[type=reset],[type=submit],button,html [type=button]{-webkit-appearance:button}[type=button]::-moz-focus-inner,[type=reset]::-moz-focus-inner,[type=submit]::-moz-focus-inner,button::-moz-focus-inner{border-style:none;padding:0}[type=button]:-moz-focusring,[type=reset]:-moz-focusring,[type=submit]:-moz-focusring,button:-moz-focusring{outline:1px dotted ButtonText}fieldset{border:1px solid silver;margin:0 2px;padding:.35em .625em .75em}legend{box-sizing:border-box;color:inherit;display:table;max-width:100%%;padding:0;white-space:normal}progress{display:inline-block;vertical-align:baseline}textarea{overflow:auto}[type=checkbox],[type=radio]{box-sizing:border-box;padding:0}[type=number]::-webkit-inner-spin-button,[type=number]::-webkit-outer-spin-button{height:auto}[type=search]{-webkit-appearance:textfield;outline-offset:-2px}[type=search]::-webkit-search-cancel-button,[type=search]::-webkit-search-decoration{-webkit-appearance:none}::-webkit-file-upload-button{-webkit-appearance:button;font:inherit}details,menu{display:block}summary{display:list-item}canvas{display:inline-block}template{display:none}[hidden]{display:none}body,html{width:100%%;height:100%%;background-color:#21232a}body{color:#fff;text-align:center;text-shadow:0 2px 4px rgba(0,0,0,.5);padding:0;min-height:100%%;-webkit-box-shadow:inset 0 0 100px rgba(0,0,0,.8);box-shadow:inset 0 0 100px rgba(0,0,0,.8);display:table;font-family:"Open Sans",Arial,sans-serif}h1{font-family:inherit;font-weight:500;line-height:1.1;color:inherit;font-size:36px}h1 small{font-size:68%%;font-weight:400;line-height:1;color:#777}a{text-decoration:none;color:#fff;font-size:inherit;border-bottom:dotted 1px #707070}.lead{color:silver;font-size:21px;line-height:1.4}table{border: 0;width:100%%;padding: 20px 0;font-size:13px;font-weight:400;line-height:1.4;color:#777}th, td{width: 50%%;white-space: nowrap;padding: 0 5px;}th{text-align:right}td{text-align:left}.cover{display:table-cell;vertical-align:middle;padding:0 20px}footer{position:fixed;width:100%%;height:40px;left:0;bottom:0;color:#a0a0a0;font-size:14px}\n\t\t</style>\n\t</head>\n\t<body>\n\t\t<div class="cover"><h1>%s <small>Error %s</small></h1><p class="lead">%s</p><table><tr><th>Request ID:</th><td>%s</td></tr><tr><th>Request Time:</th><td>%s</td></tr><tr><th>Client IP:</th><td>%s</td></tr><tr><th>Server Time:</th><td>%s</td></tr></table></div>\n\t</body>\n</html>\n',
            status, html_error, html_error,
            status, html_msg, request_id,
            request_time, client_ip, datetime)
        ngx.header.Content_Type = 'text/html; charset=UTF-8'
        ngx.header.Content_Length = #html
        ngx.header["X-Request-ID"] = request_id
        ngx.header["X-Client-IP"] = client_ip
        ngx.print(html)
        return ngx.exit(status)
    }
}
